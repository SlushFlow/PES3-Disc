name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a GitHub Release and upload build artifacts
        type: boolean
        default: false
      release_tag:
        description: Release tag (e.g. v1.0.1). Required when creating a release.
        type: string
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $v = '${{ github.ref_name }}' -replace '^v', ''
          } elseif ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.create_release }}' -eq 'true' -and '${{ inputs.release_tag }}' -ne '') {
            $v = '${{ inputs.release_tag }}' -replace '^v', ''
          } else {
            $v = '0.0.0-ci'
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          "PES3_VERSION=$v" >> $env:GITHUB_ENV
          Write-Host "Building version $v"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Clone ps3-disc-dumper
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path external -Force | Out-Null
          git clone --depth 1 https://github.com/13xforever/ps3-disc-dumper.git external/ps3-disc-dumper
          $commit = git -C external/ps3-disc-dumper rev-parse HEAD
          "PS3_DISC_DUMPER_COMMIT=$commit" >> $env:GITHUB_ENV
          Write-Host "ps3-disc-dumper commit: $commit"
          ./scripts/Apply-Ps3DiscDumperBuildProps.ps1

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Verify ISCC on PATH
        shell: pwsh
        run: |
          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if (-not $iscc) { throw 'iscc not on PATH after Inno Setup install' }
          Write-Host "ISCC: $($iscc.Source)"

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          foreach ($f in @('Build-App.ps1', 'Build-Installer.ps1')) {
            $tokens = $null; $errs = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $f), [ref]$tokens, [ref]$errs)
            if ($errs) {
              $errs | ForEach-Object { Write-Error $_ }
              throw "Parse errors in $f"
            }
          }

      - name: Build solution (compile check)
        run: dotnet build PES3-Disc.sln -c Release

      - name: Build PES3-Disc and installer
        shell: pwsh
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: |
          ./Build-Installer.ps1

      - name: Upload Inno logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: inno-build-log
          path: |
            installer/output/iscc-stdout.txt
            installer/output/iscc-stderr.txt
            installer/stage/
          if-no-files-found: ignore

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $zip = 'installer/output/PES3-Disc-portable-win-x64.zip'
          if (Test-Path dist/pes3-disc-dump.exe) {
            Compress-Archive -Path dist/* -DestinationPath $zip -Force
          } else {
            Compress-Archive -Path dist/PES3-Disc.exe -DestinationPath $zip -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PES3-Disc-windows-${{ steps.version.outputs.version }}
          path: |
            installer/output/PES3-Disc-Setup.exe
            installer/output/PES3-Disc-portable-win-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.create_release }}" = "true" ] && [ -n "${{ inputs.release_tag }}" ]; then
            v="${{ inputs.release_tag }}"
            v="${v#v}"
          else
            v="0.0.0-ci"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "PES3_VERSION=$v" >> "$GITHUB_ENV"
          echo "Building version $v"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Clone ps3-disc-dumper
        run: |
          mkdir -p external
          git clone --depth 1 https://github.com/13xforever/ps3-disc-dumper.git external/ps3-disc-dumper
          echo "PS3_DISC_DUMPER_COMMIT=$(git -C external/ps3-disc-dumper rev-parse HEAD)" >> "$GITHUB_ENV"
          cp build/ps3-disc-dumper.Directory.Build.props external/ps3-disc-dumper/Directory.Build.props

      - name: Patch ps3-disc-dumper for Linux build
        run: |
          chmod +x scripts/patch-ps3-disc-dumper-for-linux.sh
          ./scripts/patch-ps3-disc-dumper-for-linux.sh
          grep -q '#if PES3_LINUX_BUILD' external/ps3-disc-dumper/Ps3DiscDumper/Dumper.cs
          grep -q '#if !PES3_LINUX_BUILD' external/ps3-disc-dumper/Ps3DiscDumper/Dumper.cs
          grep -q "IsOSPlatform('Windows')" external/ps3-disc-dumper/Ps3DiscDumper/Ps3DiscDumper.csproj

      - name: Build Linux bundle
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PES3-Disc-linux-${{ steps.version.outputs.version }}
          path: installer/output/PES3-Disc-linux-x64.tar.gz

  release:
    needs: [build-windows, build-linux]
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       inputs.create_release == true &&
       inputs.release_tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: rel
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            raw="$REF_NAME"
          else
            raw="$INPUT_TAG"
          fi
          tag="$(printf '%s' "$raw" | tr -d '[:space:]' | sed 's|^refs/tags/||')"
          if [ -z "$tag" ]; then
            echo "::error::Release tag is empty. Enter a tag like v1.0.1 when creating a release."
            exit 1
          fi
          case "$tag" in
            v*) ;;
            *) tag="v$tag" ;;
          esac
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+(\.[0-9]+){0,2}([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid release tag '$tag'. Use semver like v1.0.0 or v1.0.1-beta.1"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing GitHub Release: $tag"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag exists
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            existing="$(git rev-parse "refs/tags/$TAG^{commit}")"
            if [ "$existing" != "${{ github.sha }}" ]; then
              echo "::error::Tag $TAG already exists on a different commit ($existing)."
              exit 1
            fi
            echo "Tag $TAG already points at this commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "${{ github.sha }}"
            git push origin "refs/tags/$TAG"
            echo "Created and pushed tag $TAG at ${{ github.sha }}"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: PES3-Disc-*
          merge-multiple: true
          path: release-assets

      - name: List release files
        run: find release-assets -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: PES3-Disc ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release-assets/PES3-Disc-Setup.exe
            release-assets/PES3-Disc-portable-win-x64.zip
            release-assets/PES3-Disc-linux-x64.tar.gz
