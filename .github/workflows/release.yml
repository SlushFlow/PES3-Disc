name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $v = '${{ github.ref_name }}' -replace '^v', ''
          } else {
            $v = '0.0.0-ci'
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          "PES3_VERSION=$v" >> $env:GITHUB_ENV
          Write-Host "Building version $v"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Clone ps3-disc-dumper
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path external -Force | Out-Null
          git clone --depth 1 https://github.com/13xforever/ps3-disc-dumper.git external/ps3-disc-dumper

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Verify ISCC on PATH
        shell: pwsh
        run: |
          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if (-not $iscc) { throw 'iscc not on PATH after Inno Setup install' }
          Write-Host "ISCC: $($iscc.Source)"

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          foreach ($f in @('Build-App.ps1', 'Build-Installer.ps1')) {
            $tokens = $null; $errs = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $f), [ref]$tokens, [ref]$errs)
            if ($errs) {
              $errs | ForEach-Object { Write-Error $_ }
              throw "Parse errors in $f"
            }
          }

      - name: Build solution (compile check)
        run: dotnet build PES3-Disc.sln -c Release

      - name: Build PES3-Disc and installer
        shell: pwsh
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: |
          ./Build-Installer.ps1

      - name: Upload Inno logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: inno-build-log
          path: |
            installer/output/iscc-stdout.txt
            installer/output/iscc-stderr.txt
            installer/stage/
          if-no-files-found: ignore

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $zip = 'installer/output/PES3-Disc-portable-win-x64.zip'
          if (Test-Path dist/pes3-disc-dump.exe) {
            Compress-Archive -Path dist/* -DestinationPath $zip -Force
          } else {
            Compress-Archive -Path dist/PES3-Disc.exe -DestinationPath $zip -Force
          }

      - name: Upload build artifacts (CI / manual)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: PES3-Disc-windows-${{ steps.version.outputs.version }}
          path: |
            installer/output/PES3-Disc-Setup.exe
            installer/output/PES3-Disc-portable-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: PES3-Disc ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            installer/output/PES3-Disc-Setup.exe
            installer/output/PES3-Disc-portable-win-x64.zip
