name: Break test

# Manual or push-triggered adversarial test run (DIY + retail fixtures).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/break-test.yml'
      - 'Test-PES3-Break.ps1'
      - 'Test-PES3-Integration.ps1'
      - 'Test-Ps3DiscDetection.ps1'
      - 'scripts/**'
      - 'tests/**'
      - 'src/**'
      - 'services/**'
      - 'test-fixtures/**'
      - 'Dockerfile'

jobs:
  break-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build + dotnet tests (Windows)
        shell: pwsh
        run: |
          dotnet build src/PES3-Disc.Core/PES3-Disc.Core.csproj -c Release -v q
          dotnet build src/PES3-Disc.BugReports/PES3-Disc.BugReports.csproj -c Release -v q
          dotnet build tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release -v q
          dotnet build tests/PES3.BugReports.Api.Tests/PES3.BugReports.Api.Tests.csproj -c Release -v q
          dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n
          dotnet test tests/PES3.BugReports.Api.Tests/PES3.BugReports.Api.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName!~BreakApiRateLimitTests"
          dotnet test tests/PES3.BugReports.Api.Tests/PES3.BugReports.Api.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~BreakApiRateLimitTests"

      - name: PowerShell tests (Windows)
        shell: pwsh
        run: |
          ./test-fixtures/Build-TestFixtures.ps1
          ./Test-Ps3DiscDetection.ps1
          ./Test-PES3-Integration.ps1 -Quick
          ./Test-PES3-Break.ps1
          $cli = './src/PES3-Disc.Cli/bin/Release/net8.0/pes3-disc-cli.dll'
          dotnet build src/PES3-Disc.Cli/PES3-Disc.Cli.csproj -c Release -v q
          $out = dotnet exec $cli scan --test-volume ./test-fixtures/diy-demo-disc --test-volume ./test-fixtures/retail-encrypted-disc 2>&1 | Out-String
          if ($out -notmatch 'PES3 DIY Test Disc') { throw 'CLI DIY fixture missing' }
          if ($out -notmatch 'EncryptedRetail|Encrypted retail|decryption') { throw 'CLI retail fixture missing' }

      - name: Docker API build (Render parity)
        run: docker build -t pes3-api-test .

  break-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Normalize scripts
        run: sed -i 's/\r$//' scripts/ci-test-linux.sh

      - name: Build Core + Core.Tests
        run: |
          dotnet --list-sdks
          dotnet build src/PES3-Disc.Core/PES3-Disc.Core.csproj -c Release -v q -p:LangVersion=12
          dotnet build tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release -v q -p:LangVersion=12

      - name: Core tests - BreakTests
        run: dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~BreakTests"

      - name: Core tests - DevStatusLogicTests
        run: dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~DevStatusLogicTests"

      - name: Core tests - BugReportLimitsTests
        run: dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~BugReportLimitsTests"

      - name: Core tests - ReportClusteringTests
        run: dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~ReportClusteringTests"

      - name: Core tests - LegalTermsTests
        run: dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~LegalTermsTests"

      - name: Core tests - DiscDetectorTests
        run: dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~DiscDetectorTests"

      - name: Core tests - GameCacheServiceTests
        run: dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~GameCacheServiceTests"

      - name: Build + run API tests (exclude rate limit)
        run: |
          dotnet build tests/PES3.BugReports.Api.Tests/PES3.BugReports.Api.Tests.csproj -c Release -v q -p:LangVersion=12
          dotnet test tests/PES3.BugReports.Api.Tests/PES3.BugReports.Api.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName!~BreakApiRateLimitTests"

      - name: API rate-limit tests
        run: dotnet test tests/PES3.BugReports.Api.Tests/PES3.BugReports.Api.Tests.csproj -c Release --no-build -v n --filter "FullyQualifiedName~BreakApiRateLimitTests"

      - name: CLI build + fixture scan
        run: |
          dotnet build src/PES3-Disc.Cli/PES3-Disc.Cli.csproj -c Release -v q -p:LangVersion=12
          ROOT="$GITHUB_WORKSPACE"
          CLI_DLL="$ROOT/src/PES3-Disc.Cli/bin/Release/net8.0/pes3-disc-cli.dll"
          DIY="$ROOT/test-fixtures/diy-demo-disc"
          RETAIL="$ROOT/test-fixtures/retail-encrypted-disc"
          test -f "$DIY/PS3_GAME/USRDIR/EBOOT.BIN"
          OUT="$(dotnet exec "$CLI_DLL" scan --test-volume "$DIY" --test-volume "$RETAIL")"
          echo "$OUT"
          echo "$OUT" | grep -qi "PES3 DIY Test Disc"
          echo "$OUT" | grep -qiE 'EncryptedRetail|Encrypted retail|decryption'
          dotnet exec "$CLI_DLL" help | grep -qi "pes3-disc"

      - name: Linux break-only dotnet tests
        run: |
          dotnet test tests/PES3-Disc.Core.Tests/PES3-Disc.Core.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~BreakTests" -v n
          dotnet test tests/PES3.BugReports.Api.Tests/PES3.BugReports.Api.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~BreakApi" -v n

      - name: Docker API build (Render parity)
        run: docker build -t pes3-api-test .
