services:
  - type: web
    name: pes3-bugreports
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: DATABASE_PATH
        value: /tmp/reports.db
      - key: DEV_API_KEY
        sync: false
